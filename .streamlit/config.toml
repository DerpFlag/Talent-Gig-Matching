[theme]
primaryColor = "#1a4d7a"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f4f8"
textColor = "#1e293b"
font = "sans serif"

[server]
headless = true
# Required on Hugging Face Docker Spaces: iframe + cookie limits break XSRF for file_uploader (403).
# See https://huggingface.co/docs/hub/spaces-cookie-limitations
enableXsrfProtection = false
maxUploadSize = 50
